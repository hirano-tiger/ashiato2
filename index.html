<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>あしあと ― プロトタイプ</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17181A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="あしあと">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback } = React;

const IconCamera = (p) => <svg width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 8h3l2-3h6l2 3h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="14" r="3.3"/></svg>;
const IconMap = (p) => <svg width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2z"/><path d="M9 4v14M15 6v14"/></svg>;
const IconList = (p) => <svg width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>;
const IconPlus = (p) => <svg width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
const IconPlay = (p) => <svg width={p.size||9} height={p.size||9} viewBox="0 0 24 24" fill={p.fill||"currentColor"}><polygon points="5,3 19,12 5,21"/></svg>;
const IconChevronLeft = (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
const IconRotate = (p) => <svg width={p.size||11} height={p.size||11} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-9.36L1 10"/></svg>;

const RECORD_DURATION = 3000;
const HOLD_THRESHOLD = 320;
const RING_C = 2 * Math.PI * 30;

const seedItems = [
  { id: "seed1", type: "photo", src: "https://picsum.photos/seed/oki1/400/400", videoUrl: null, duration: 0,
    lat: 26.4200, lng: 127.7400, ts: new Date("2026-08-10T10:15:00"), tags: ["沖縄旅行"], mocked: true },
  { id: "seed2", type: "video", src: "https://picsum.photos/seed/oki2/400/400", videoUrl: null, duration: 3,
    lat: 26.3820, lng: 127.7900, ts: new Date("2026-08-11T13:40:00"), tags: ["沖縄旅行"], mocked: true, simulated: true },
  { id: "seed3", type: "photo", src: "https://picsum.photos/seed/oki3/400/400", videoUrl: null, duration: 0,
    lat: 26.3500, lng: 127.8620, ts: new Date("2026-08-12T09:05:00"), tags: ["沖縄旅行"], mocked: true },
  { id: "seed4", type: "photo", src: "https://picsum.photos/seed/date1/400/400", videoUrl: null, duration: 0,
    lat: 26.2120, lng: 127.6800, ts: new Date("2026-08-20T18:30:00"), tags: ["8月デート"], mocked: true },
];

function pad(n) { return n.toString().padStart(2, "0"); }
function fmtDateTime(d) {
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDateShort(d) { return `${pad(d.getMonth() + 1)}.${pad(d.getDate())}`; }

function App() {
  const [screen, setScreen] = useState("camera");
  const [items, setItems] = useState(seedItems);
  const [allTags, setAllTags] = useState(["沖縄旅行", "8月デート"]);
  const [pending, setPending] = useState(null);
  const [streamOk, setStreamOk] = useState(false);
  const [isRecording, setIsRecording] = useState(false);
  const [recordProgress, setRecordProgress] = useState(0);
  const [lastLoc, setLastLoc] = useState({ lat: 26.4500, lng: 127.7600, accuracy: null, mocked: true });
  const [filteredTags, setFilteredTags] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [showAddInput, setShowAddInput] = useState(false);
  const [newTagText, setNewTagText] = useState("");

  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const pressTimerRef = useRef(null);
  const recordIntervalRef = useRef(null);
  const recordStartRef = useRef(0);
  const lastTagsRef = useRef([]);

  useEffect(() => {
    let cancelled = false;
    if (screen === "camera") {
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices
          .getUserMedia({ video: { facingMode: "environment" }, audio: false })
          .then((stream) => {
            if (cancelled) { stream.getTracks().forEach((t) => t.stop()); return; }
            streamRef.current = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              videoRef.current.play().catch(() => {});
            }
            setStreamOk(true);
          })
          .catch(() => setStreamOk(false));
      } else {
        setStreamOk(false);
      }
    }
    return () => {
      cancelled = true;
      if (streamRef.current) {
        streamRef.current.getTracks().forEach((t) => t.stop());
        streamRef.current = null;
      }
      setStreamOk(false);
    };
  }, [screen]);

  const mockNearLast = useCallback(() => {
    const jitter = () => (Math.random() - 0.5) * 0.02;
    return { lat: lastLoc.lat + jitter(), lng: lastLoc.lng + jitter(), accuracy: 15, mocked: true };
  }, [lastLoc]);

  const fetchFreshLocation = useCallback((cb) => {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy, mocked: false };
          setLastLoc(loc);
          cb(loc);
        },
        () => { const loc = mockNearLast(); setLastLoc(loc); cb(loc); },
        { enableHighAccuracy: true, timeout: 4000, maximumAge: 2000 }
      );
    } else {
      const loc = mockNearLast();
      setLastLoc(loc);
      cb(loc);
    }
  }, [mockNearLast]);

  function capturePosterFrame() {
    if (streamOk && videoRef.current && canvasRef.current && videoRef.current.videoWidth) {
      const v = videoRef.current, c = canvasRef.current;
      c.width = v.videoWidth; c.height = v.videoHeight;
      const ctx = c.getContext("2d");
      ctx.drawImage(v, 0, 0, c.width, c.height);
      try { return c.toDataURL("image/jpeg", 0.85); } catch (e) {}
    }
    return `https://picsum.photos/seed/${Date.now()}/400/400`;
  }

  function finalizeCapture(partial) {
    fetchFreshLocation((loc) => {
      const item = {
        id: "m" + Date.now() + Math.random().toString(36).slice(2, 6),
        ts: new Date(),
        lat: loc.lat, lng: loc.lng, mocked: loc.mocked,
        tags: [...lastTagsRef.current],
        ...partial,
      };
      setPending(item);
      setScreen("tag");
    });
  }

  function takePhoto() {
    const src = capturePosterFrame();
    finalizeCapture({ type: "photo", src, videoUrl: null, duration: 0, simulated: !streamOk });
  }

  function startRecording() {
    setIsRecording(true);
    setRecordProgress(0);
    const poster = capturePosterFrame();
    recordStartRef.current = Date.now();
    recordIntervalRef.current = setInterval(() => {
      const elapsed = Date.now() - recordStartRef.current;
      setRecordProgress(Math.min(100, (elapsed / RECORD_DURATION) * 100));
    }, 30);

    let recorder = null;
    let chunks = [];
    if (streamOk && window.MediaRecorder && streamRef.current) {
      try {
        recorder = new MediaRecorder(streamRef.current);
        recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
        recorder.start();
      } catch (e) { recorder = null; }
    }

    setTimeout(() => {
      clearInterval(recordIntervalRef.current);
      setRecordProgress(100);
      if (recorder && recorder.state !== "inactive") {
        recorder.onstop = () => {
          const blob = new Blob(chunks, { type: "video/webm" });
          const url = URL.createObjectURL(blob);
          finalizeCapture({ type: "video", src: poster, videoUrl: url, duration: 3, simulated: false });
        };
        recorder.stop();
      } else {
        finalizeCapture({ type: "video", src: poster, videoUrl: null, duration: 3, simulated: true });
      }
      setIsRecording(false);
      setTimeout(() => setRecordProgress(0), 200);
    }, RECORD_DURATION);
  }

  function handlePointerDown(e) {
    e.preventDefault();
    if (isRecording || pending) return;
    pressTimerRef.current = setTimeout(() => { pressTimerRef.current = null; startRecording(); }, HOLD_THRESHOLD);
  }
  function handlePointerUp() {
    if (pressTimerRef.current) {
      clearTimeout(pressTimerRef.current);
      pressTimerRef.current = null;
      if (!isRecording) takePhoto();
    }
  }

  function toggleTag(tag) {
    setPending((p) => p.tags.includes(tag)
      ? { ...p, tags: p.tags.filter((t) => t !== tag) }
      : { ...p, tags: [...p.tags, tag] });
  }
  function commitNewTag() {
    const t = newTagText.trim();
    if (t) {
      setAllTags((prev) => (prev.includes(t) ? prev : [...prev, t]));
      setPending((p) => ({ ...p, tags: p.tags.includes(t) ? p.tags : [...p.tags, t] }));
    }
    setNewTagText(""); setShowAddInput(false);
  }
  function savePending() {
    lastTagsRef.current = pending.tags;
    setItems((prev) => [...prev, pending]);
    setPending(null);
    setScreen("map");
  }
  function discardPending() {
    if (pending && pending.videoUrl) URL.revokeObjectURL(pending.videoUrl);
    setPending(null);
    setScreen("camera");
  }

  function toggleFilterTag(tag) {
    setFilteredTags((prev) => prev.includes(tag) ? prev.filter((t) => t !== tag) : [...prev, tag]);
    setSelectedId(null);
  }

  function resetDemo() {
    setItems(seedItems); setAllTags(["沖縄旅行", "8月デート"]);
    setFilteredTags([]); setSelectedId(null); setPending(null); setScreen("camera");
  }

  const filtered = items.filter((it) => filteredTags.length === 0 || it.tags.some((t) => filteredTags.includes(t)));
  const sorted = [...filtered].sort((a, b) => a.ts - b.ts);
  const lats = sorted.map((i) => i.lat), lngs = sorted.map((i) => i.lng);
  const minLat = lats.length ? Math.min(...lats) : 26.4, maxLat = lats.length ? Math.max(...lats) : 26.5;
  const minLng = lngs.length ? Math.min(...lngs) : 127.7, maxLng = lngs.length ? Math.max(...lngs) : 127.8;
  const latRange = Math.max(maxLat - minLat, 0.01), lngRange = Math.max(maxLng - minLng, 0.01);
  const projected = sorted.map((it) => ({
    ...it,
    px: 10 + ((it.lng - minLng) / lngRange) * 80,
    py: 16 + ((maxLat - it.lat) / latRange) * 58,
  }));
  const selected = projected.find((p) => p.id === selectedId) || projected[projected.length - 1] || null;

  const tagGroups = allTags
    .map((tag) => ({ tag, group: items.filter((it) => it.tags.includes(tag)).sort((a, b) => a.ts - b.ts) }))
    .filter((g) => g.group.length > 0);

  return (
    <div style={{ minHeight: "100vh" }}>
      <div className="intro">
        <div className="eyebrow">Prototype ― tap to try</div>
        <h1>あしあと</h1>
        <p className="note">
          カメラ／位置情報の使用許可を求めることがあります。許可されない場合はデモ用のダミー映像・座標で動作します。
          <button className="reset-link" onClick={resetDemo}><IconRotate size={11} style={{ marginRight: 4, verticalAlign: -2 }} />リセット</button>
        </p>
      </div>

      <div className="phone">
        <div className="notch" />
        <div className="screen">

          {screen === "camera" && (
            <div className="s-camera">
              {streamOk ? (
                <video ref={videoRef} muted playsInline className="cam-video" />
              ) : (
                <div className="cam-fallback">
                  <span>カメラ映像(この環境では利用不可・デモ表示)</span>
                </div>
              )}
              <canvas ref={canvasRef} style={{ display: "none" }} />
              <div className="cam-scrim" />

              <div className="status-row">
                <div className="gps-chip">
                  {lastLoc ? (
                    <>{lastLoc.lat.toFixed(4)} N<br />{lastLoc.lng.toFixed(4)} E {lastLoc.mocked ? "(推定)" : ""}</>
                  ) : "取得中..."}
                </div>
              </div>

              <div className="hint-row">
                {isRecording ? (
                  <span className="rec-live"><span className="dot" />REC {(recordProgress / 100 * 3).toFixed(1)}s / 3.0s</span>
                ) : (
                  <span>タップ：写真　長押し：動画3秒</span>
                )}
              </div>

              <div className="shutter-row">
                <div className={"last-shot" + (items.length && items[items.length - 1].type === "video" ? " video" : "")}
                     style={items.length ? { backgroundImage: `url(${items[items.length - 1].src})` } : {}} />
                <div className="shutter-outer"
                     onPointerDown={handlePointerDown}
                     onPointerUp={handlePointerUp}
                     onPointerLeave={handlePointerUp}
                     onContextMenu={(e) => e.preventDefault()}>
                  <svg className="ring" viewBox="0 0 68 68">
                    <circle cx="34" cy="34" r="30" stroke="rgba(255,255,255,.3)" strokeWidth="3" fill="none" />
                    {isRecording && (
                      <circle cx="34" cy="34" r="30" stroke="#DD3B2C" strokeWidth="3" fill="none"
                        strokeDasharray={`${(recordProgress / 100) * RING_C} ${RING_C}`}
                        strokeLinecap="round" transform="rotate(-90 34 34)" />
                    )}
                  </svg>
                  <div className={"shutter-inner" + (isRecording ? " video" : "")} />
                </div>
                <div className="flip-icon" />
              </div>
            </div>
          )}

          {screen === "tag" && pending && (
            <div className="s-tag">
              <button className="back-btn" onClick={discardPending}><IconChevronLeft size={16} /></button>
              <div className="shot-top">
                {pending.type === "video" && pending.videoUrl ? (
                  <video src={pending.videoUrl} poster={pending.src} controls playsInline className="tag-video" />
                ) : (
                  <img src={pending.src} alt="" className="tag-img" />
                )}
                {pending.type === "video" && (
                  <div className="media-badge"><IconPlay size={9} fill="#fff" style={{ marginRight: 3 }} />0:03{pending.simulated ? "(デモ)" : ""}</div>
                )}
              </div>
              <div className="meta-strip">
                <span>{fmtDateTime(pending.ts)}</span>
                <span>{pending.lat.toFixed(4)}, {pending.lng.toFixed(4)}{pending.mocked ? " (推定)" : ""}</span>
              </div>
              <div className="tag-body">
                <div className="tag-label">タグを選択</div>
                <div className="chips">
                  {allTags.map((tag) => (
                    <div key={tag} className={"chip" + (pending.tags.includes(tag) ? " active" : "")} onClick={() => toggleTag(tag)}>
                      {tag}
                    </div>
                  ))}
                  {showAddInput ? (
                    <input
                      autoFocus className="tag-input" value={newTagText}
                      placeholder="新しいタグ"
                      onChange={(e) => setNewTagText(e.target.value)}
                      onKeyDown={(e) => { if (e.key === "Enter") commitNewTag(); if (e.key === "Escape") { setShowAddInput(false); setNewTagText(""); } }}
                      onBlur={commitNewTag}
                    />
                  ) : (
                    <div className="chip add" onClick={() => setShowAddInput(true)}><IconPlus size={11} style={{ marginRight: 3, verticalAlign: -1 }} />追加</div>
                  )}
                </div>
              </div>
              <div className="save-btn" onClick={savePending}>保存</div>
            </div>
          )}

          {screen === "map" && (
            <div className="s-map">
              <div className="map-filter">
                <div className={"fchip" + (filteredTags.length === 0 ? "" : " off")} onClick={() => setFilteredTags([])}>すべて</div>
                {allTags.map((tag) => (
                  <div key={tag} className={"fchip" + (filteredTags.includes(tag) ? "" : " off")} onClick={() => toggleFilterTag(tag)}>{tag}</div>
                ))}
              </div>

              <div className="map-area">
                <svg width="100%" height="100%" style={{ position: "absolute", inset: 0 }}>
                  <polyline
                    points={projected.map((p) => `${p.px}%,${p.py}%`).join(" ")}
                    fill="none" stroke="#9AA39C" strokeWidth="2" strokeDasharray="1 8" strokeLinecap="round"
                  />
                </svg>
                {projected.map((p) => (
                  <div key={p.id}
                       className={"pin" + (p.type === "video" ? " video" : "") + (p.id === selectedId ? " sel" : "")}
                       style={{ left: `${p.px}%`, top: `${p.py}%` }}
                       onClick={() => setSelectedId(p.id)}>
                    <img src={p.src} alt="" />
                  </div>
                ))}
                {projected.length === 0 && <div className="map-empty">この条件の記録はまだありません</div>}
              </div>

              <div className="sheet">
                <div className="sheet-handle" />
                {selected ? (
                  <>
                    <div className="sheet-title">{fmtDateShort(selected.ts)}　{selected.tags.join(" / ") || "タグなし"}</div>
                    <div className="sheet-sub">{selected.lat.toFixed(4)}, {selected.lng.toFixed(4)} ・ {selected.type === "video" ? "動画 0:03" : "写真"}</div>
                    <div className="film">
                      {projected.map((p) => (
                        <div key={p.id} className={"film-item" + (p.id === selected.id ? " sel" : "")} onClick={() => setSelectedId(p.id)}>
                          <img src={p.src} alt="" />
                          {p.type === "video" && <div className="dur">0:03</div>}
                        </div>
                      ))}
                    </div>
                  </>
                ) : <div className="sheet-sub">ピンをタップすると詳細が表示されます</div>}
              </div>
            </div>
          )}

          {screen === "list" && (
            <div className="s-list">
              <div className="alb-head">
                <div className="t">タグ一覧</div>
                <div className="s">{tagGroups.length} tags ・ {items.length} items</div>
              </div>
              <div className="alb-grid">
                {tagGroups.map(({ tag, group }) => (
                  <div key={tag} className="album" onClick={() => { setFilteredTags([tag]); setScreen("map"); }}>
                    <div className="album-top">
                      <span className="name">{tag}</span>
                      <span className="range">{fmtDateShort(group[0].ts)}
                        {group.length > 1 ? `-${fmtDateShort(group[group.length - 1].ts)}` : ""} ・ {group.length}</span>
                    </div>
                    <div className="thumbs">
                      {group.slice(0, 3).map((it) => (
                        <div key={it.id} className="t-item">
                          <img src={it.src} alt="" />
                          {it.type === "video" && <div className="dur">0:03</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {screen !== "tag" && (
            <div className="tabbar">
              <button className={screen === "camera" ? "active" : ""} onClick={() => setScreen("camera")}><IconCamera size={18} /></button>
              <button className={screen === "map" ? "active" : ""} onClick={() => setScreen("map")}><IconMap size={18} /></button>
              <button className={screen === "list" ? "active" : ""} onClick={() => setScreen("list")}><IconList size={18} /></button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>

<style>
  * { box-sizing:border-box; }
  body,html { margin:0; }
  body {
    background:#F3F3F1; font-family:'Zen Kaku Gothic New', sans-serif; color:#17181A;
    padding:36px 16px 60px; display:flex; flex-direction:column; align-items:center;
  }
  .intro { max-width:340px; text-align:center; margin-bottom:24px; }
  .eyebrow { font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:.14em; color:#A8A9A4; text-transform:uppercase; margin-bottom:8px; }
  .intro h1 { font-weight:700; font-size:30px; margin:0 0 10px; letter-spacing:-.01em; }
  .note { font-size:11.5px; line-height:1.7; color:#6E6F6B; margin:0; }
  .reset-link { display:inline-flex; align-items:center; margin-left:6px; background:none; border:1px solid #D8D8D3; border-radius:6px; padding:3px 8px; font-size:10.5px; color:#454540; cursor:pointer; font-family:'JetBrains Mono', monospace; }

  .phone { width:320px; height:660px; border-radius:28px; background:#0c0c0d; padding:10px; box-shadow:0 24px 48px -18px rgba(0,0,0,.35); position:relative; }
  .notch { position:absolute; top:10px; left:50%; transform:translateX(-50%); width:80px; height:16px; background:#0c0c0d; border-radius:9px; z-index:50; }
  .screen { width:100%; height:100%; border-radius:20px; overflow:hidden; position:relative; background:#fff; }

  .s-camera { position:absolute; inset:0; background:#111; }
  .cam-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
