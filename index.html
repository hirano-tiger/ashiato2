<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>あしあと ― プロトタイプ</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17181A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="あしあと">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  body,html { margin:0; }
  body {
    background:#F3F3F1; font-family:'Zen Kaku Gothic New', 'Hiragino Sans', sans-serif; color:#17181A;
    padding:36px 16px 60px; display:flex; flex-direction:column; align-items:center;
  }
  .mono { font-family:'JetBrains Mono', monospace; }
  .intro { max-width:340px; text-align:center; margin-bottom:24px; }
  .eyebrow { font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:.14em; color:#A8A9A4; text-transform:uppercase; margin-bottom:8px; }
  .intro h1 { font-weight:700; font-size:30px; margin:0 0 10px; letter-spacing:-.01em; }
  .note { font-size:11.5px; line-height:1.7; color:#6E6F6B; margin:0; }
  .reset-link { display:inline-flex; align-items:center; margin-left:6px; background:none; border:1px solid #D8D8D3; border-radius:6px; padding:3px 8px; font-size:10.5px; color:#454540; cursor:pointer; font-family:'JetBrains Mono', monospace; }

  .phone { width:320px; max-width:92vw; height:660px; border-radius:28px; background:#0c0c0d; padding:10px; box-shadow:0 24px 48px -18px rgba(0,0,0,.35); position:relative; }
  .notch { position:absolute; top:10px; left:50%; transform:translateX(-50%); width:80px; height:16px; background:#0c0c0d; border-radius:9px; z-index:50; }
  .screen { width:100%; height:100%; border-radius:20px; overflow:hidden; position:relative; background:#fff; }

  .s-camera, .s-tag, .s-map, .s-list { display:none; }
  .s-camera.active { display:block; }
  .s-tag.active { display:flex; flex-direction:column; }
  .s-map.active { display:flex; flex-direction:column; }
  .s-list.active { display:block; }

  /* camera */
  .s-camera { position:absolute; inset:0; background:#111; }
  .cam-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; background:#111; }
  .cam-fallback { position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:linear-gradient(160deg,#2a2c2e,#111); }
  .cam-fallback.show { display:flex; }
  .cam-fallback span { color:rgba(255,255,255,.5); font-size:11px; max-width:200px; text-align:center; font-family:'JetBrains Mono', monospace; }
  .cam-scrim { position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.05) 0%, rgba(0,0,0,.55) 82%, rgba(0,0,0,.72) 100%); pointer-events:none; }
  .status-row { position:absolute; top:24px; left:14px; right:14px; z-index:5; display:flex; justify-content:flex-end; }
  .gps-chip { background:rgba(0,0,0,.45); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,.18); border-radius:6px; padding:6px 9px; font-size:10px; font-family:'JetBrains Mono', monospace; color:#EDEDEA; text-align:right; line-height:1.5; }
  .hint-row { position:absolute; top:66px; left:0; right:0; z-index:5; text-align:center; font-size:11px; color:rgba(255,255,255,.65); font-family:'JetBrains Mono', monospace; }
  .rec-live { color:#fff; display:none; align-items:center; gap:6px; justify-content:center; }
  .rec-live.show { display:inline-flex; }
  .hint-static.hide { display:none; }
  .rec-live .dot { width:7px; height:7px; border-radius:50%; background:#DD3B2C; }
  .shutter-row { position:absolute; bottom:78px; left:0; right:0; z-index:5; display:flex; align-items:center; justify-content:center; gap:44px; }
  .last-shot { width:36px; height:36px; border-radius:6px; border:1.5px solid rgba(255,255,255,.7); background-size:cover; background-position:center; background-color:rgba(255,255,255,.15); position:relative; }
  .last-shot.video::after { content:"0:03"; position:absolute; bottom:2px; right:2px; font-family:'JetBrains Mono', monospace; font-size:6.5px; color:#fff; background:rgba(0,0,0,.55); padding:1px 3px; border-radius:2px; }
  .shutter-outer { width:68px; height:68px; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; touch-action:none; user-select:none; }
  .ring { position:absolute; inset:0; width:68px; height:68px; }
  .shutter-inner { width:54px; height:54px; border-radius:50%; background:#DD3B2C; transition:border-radius .15s; }
  .shutter-inner.video { border-radius:14px; width:44px; height:44px; }
  .flip-icon { width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.35); }

  /* tag screen */
  .s-tag { position:absolute; inset:0; background:#fff; }
  .back-btn { position:absolute; top:14px; left:14px; z-index:6; width:30px; height:30px; border-radius:50%; background:rgba(0,0,0,.4); border:none; color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .shot-top { height:38%; width:100%; position:relative; background:#000; flex-shrink:0; }
  .tag-img, .tag-video { width:100%; height:100%; object-fit:cover; display:block; }
  .media-badge { position:absolute; top:12px; right:12px; background:rgba(0,0,0,.55); color:#fff; font-size:9.5px; font-family:'JetBrains Mono', monospace; padding:3px 7px; border-radius:4px; display:flex; align-items:center; }
  .meta-strip { padding:11px 20px; border-bottom:1px solid rgba(23,24,26,.13); font-family:'JetBrains Mono', monospace; font-size:10px; color:#6E6F6B; display:flex; justify-content:space-between; }
  .tag-body { padding:16px 20px 0; flex:1; overflow:auto; }
  .tag-label { font-size:11px; color:#6E6F6B; margin-bottom:10px; }
  .chips { display:flex; flex-wrap:wrap; gap:7px; }
  .chip { font-size:12px; padding:6px 12px; border-radius:6px; border:1px solid rgba(23,24,26,.13); color:#17181A; cursor:pointer; }
  .chip.active { background:#17181A; color:#fff; border-color:#17181A; }
  .chip.add { border-style:dashed; color:#A8A9A4; display:flex; align-items:center; }
  .tag-input { font-size:12px; padding:6px 10px; border-radius:6px; border:1px solid #17181A; outline:none; width:100px; font-family:'Zen Kaku Gothic New', sans-serif; }
  .save-btn { margin:16px 20px 20px; height:46px; border-radius:8px; background:#17181A; color:#fff; display:flex; align-items:center; justify-content:center; font-size:13.5px; cursor:pointer; flex-shrink:0; }

  /* map */
  .s-map { position:absolute; top:0; left:0; right:0; bottom:58px; background:#E7E6E1; }
  .map-filter { position:absolute; top:16px; left:14px; right:14px; z-index:6; display:flex; gap:7px; overflow-x:auto; }
  .fchip { font-size:10.5px; padding:6px 10px; border-radius:6px; background:#17181A; color:#fff; white-space:nowrap; cursor:pointer; }
  .fchip.off { background:#fff; color:#6E6F6B; border:1px solid rgba(23,24,26,.13); }
  .map-area { position:relative; flex:1; }
  .map-empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; color:#8A8B86; font-family:'JetBrains Mono', monospace; text-align:center; padding:0 40px; }
  .pin { position:absolute; width:34px; height:34px; border-radius:7px; border:2px solid #17181A; overflow:hidden; background:#000; transform:translate(-50%,-50%); cursor:pointer; }
  .pin.sel { border-color:#DD3B2C; box-shadow:0 0 0 3px rgba(221,59,44,.25); }
  .pin img { width:100%; height:100%; object-fit:cover; display:block; opacity:.92; }
  .pin.video::after { content:""; position:absolute; inset:0; margin:auto; width:0; height:0; border-top:4px solid transparent; border-bottom:4px solid transparent; border-left:7px solid #fff; }
  .sheet { background:#fff; border-radius:16px 16px 0 0; box-shadow:0 -8px 20px rgba(0,0,0,.08); padding:12px 18px 14px; flex-shrink:0; min-height:118px; position:absolute; left:0; right:0; bottom:0; }
  .sheet-handle { width:34px; height:3px; background:rgba(23,24,26,.13); border-radius:2px; margin:0 auto 10px; }
  .sheet-title { font-size:12.5px; font-weight:700; margin-bottom:2px; }
  .sheet-sub { font-family:'JetBrains Mono', monospace; font-size:10px; color:#6E6F6B; margin-bottom:10px; }
  .film { display:flex; gap:7px; overflow-x:auto; }
  .film-item { position:relative; width:44px; height:44px; border-radius:6px; overflow:hidden; flex-shrink:0; opacity:.6; cursor:pointer; }
  .film-item.sel { opacity:1; outline:2px solid #DD3B2C; outline-offset:1px; }
  .film-item img { width:100%; height:100%; object-fit:cover; }
  .dur { position:absolute; bottom:1px; right:2px; font-family:'JetBrains Mono', monospace; font-size:6.5px; color:#fff; background:rgba(0,0,0,.55); padding:0 2px; border-radius:2px; }

  /* list */
  .s-list { position:absolute; top:0; left:0; right:0; bottom:58px; background:#fff; overflow:auto; }
  .alb-head { padding:26px 20px 4px; }
  .alb-head .t { font-size:16px; font-weight:700; }
  .alb-head .s { font-family:'JetBrains Mono', monospace; font-size:10px; color:#6E6F6B; margin-top:5px; }
  .alb-grid { padding:14px 20px 70px; display:flex; flex-direction:column; gap:10px; }
  .album { background:#fff; border:1px solid rgba(23,24,26,.13); border-radius:10px; padding:14px; cursor:pointer; }
  .album-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .album .name { font-size:13.5px; font-weight:700; }
  .album .range { font-family:'JetBrains Mono', monospace; font-size:9.5px; color:#6E6F6B; }
  .thumbs { display:flex; gap:6px; }
  .t-item { position:relative; width:42px; height:42px; border-radius:6px; overflow:hidden; }
  .t-item img { width:100%; height:100%; object-fit:cover; }

  /* tabbar */
  .tabbar { position:absolute; left:0; right:0; bottom:0; height:58px; background:rgba(255,255,255,.92); backdrop-filter:blur(8px); border-top:1px solid rgba(23,24,26,.1); display:flex; z-index:20; }
  .tabbar.hidden { display:none; }
  .tabbar button { flex:1; border:none; background:none; display:flex; align-items:center; justify-content:center; color:#A8A9A4; cursor:pointer; }
  .tabbar button.active { color:#17181A; }
  .tabbar.dark { background:rgba(0,0,0,.35); border-top:1px solid rgba(255,255,255,.12); }
  .tabbar.dark button { color:rgba(255,255,255,.55); }
  .tabbar.dark button.active { color:#fff; }
</style>
</head>
<body>

<div class="intro">
  <div class="eyebrow">Prototype ― tap to try</div>
  <h1>あしあと</h1>
  <p class="note">
    カメラ／位置情報の使用許可を求めることがあります。許可されない場合はデモ用のダミー映像・座標で動作します。
    <button class="reset-link" data-action="reset">↺ リセット</button>
  </p>
</div>

<div class="phone">
  <div class="notch"></div>
  <div class="screen">

    <!-- CAMERA -->
    <div id="screen-camera" class="s-camera active">
      <video id="cam-video" class="cam-video" muted playsinline autoplay></video>
      <div id="cam-fallback" class="cam-fallback"><span>カメラ映像(この環境では利用不可・デモ表示)</span></div>
      <canvas id="cam-canvas" style="display:none"></canvas>
      <div class="cam-scrim"></div>

      <div class="status-row"><div class="gps-chip" id="gps-text">取得中...</div></div>

      <div class="hint-row">
        <span class="hint-static" id="hint-static">タップ：写真　長押し：動画3秒</span>
        <span class="rec-live" id="rec-live"><span class="dot"></span><span id="rec-time">REC 0.0s / 3.0s</span></span>
      </div>

      <div class="shutter-row">
        <div class="last-shot" id="last-shot"></div>
        <div class="shutter-outer" id="shutter-outer">
          <svg class="ring" viewBox="0 0 68 68">
            <circle cx="34" cy="34" r="30" stroke="rgba(255,255,255,.3)" stroke-width="3" fill="none"/>
            <circle id="ring-progress" cx="34" cy="34" r="30" stroke="#DD3B2C" stroke-width="3" fill="none"
              stroke-dasharray="0 188.5" stroke-linecap="round" transform="rotate(-90 34 34)"/>
          </svg>
          <div class="shutter-inner" id="shutter-inner"></div>
        </div>
        <div class="flip-icon"></div>
      </div>
    </div>

    <!-- TAG -->
    <div id="screen-tag" class="s-tag">
      <button class="back-btn" data-action="discard">‹</button>
      <div class="shot-top" id="tag-shot-top"></div>
      <div class="meta-strip" id="tag-meta"></div>
      <div class="tag-body">
        <div class="tag-label">タグを選択</div>
        <div class="chips" id="tag-chips"></div>
      </div>
      <div class="save-btn" data-action="save">保存</div>
    </div>

    <!-- MAP -->
    <div id="screen-map" class="s-map">
      <div class="map-filter" id="map-filter"></div>
      <div class="map-area">
        <svg id="map-svg" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
        <div id="map-pins"></div>
        <div class="map-empty" id="map-empty" style="display:none">この条件の記録はまだありません</div>
      </div>
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div id="map-sheet-content"></div>
      </div>
    </div>

    <!-- LIST -->
    <div id="screen-list" class="s-list">
      <div class="alb-head">
        <div class="t">タグ一覧</div>
        <div class="s" id="list-summary"></div>
      </div>
      <div class="alb-grid" id="list-grid"></div>
    </div>

    <div class="tabbar" id="tabbar">
      <button data-action="show" data-screen="camera">📷</button>
      <button data-action="show" data-screen="map">🗺</button>
      <button data-action="show" data-screen="list">☰</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var RECORD_DURATION = 3000;
  var HOLD_THRESHOLD = 320;
  var RING_C = 2 * Math.PI * 30;

  var seedItems = [
    { id: "seed1", type: "photo", src: "https://picsum.photos/seed/oki1/400/400", videoUrl: null, duration: 0,
      lat: 26.4200, lng: 127.7400, ts: new Date("2026-08-10T10:15:00"), tags: ["沖縄旅行"], mocked: true },
    { id: "seed2", type: "video", src: "https://picsum.photos/seed/oki2/400/400", videoUrl: null, duration: 3,
      lat: 26.3820, lng: 127.7900, ts: new Date("2026-08-11T13:40:00"), tags: ["沖縄旅行"], mocked: true, simulated: true },
    { id: "seed3", type: "photo", src: "https://picsum.photos/seed/oki3/400/400", videoUrl: null, duration: 0,
      lat: 26.3500, lng: 127.8620, ts: new Date("2026-08-12T09:05:00"), tags: ["沖縄旅行"], mocked: true },
    { id: "seed4", type: "photo", src: "https://picsum.photos/seed/date1/400/400", videoUrl: null, duration: 0,
      lat: 26.2120, lng: 127.6800, ts: new Date("2026-08-20T18:30:00"), tags: ["8月デート"], mocked: true }
  ];

  var state = {
    screen: "camera",
    items: seedItems.slice(),
    allTags: ["沖縄旅行", "8月デート"],
    pending: null,
    streamOk: false,
    isRecording: false,
    lastLoc: { lat: 26.4500, lng: 127.7600, mocked: true },
    filteredTags: [],
    selectedId: null,
    showAddInput: false,
    lastTags: []
  };

  var mediaStream = null;
  var pressTimer = null;
  var recordInterval = null;
  var recordStart = 0;

  function pad(n) { return String(n).padStart(2, "0"); }
  function fmtDateTime(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes()); }
  function fmtDateShort(d) { return pad(d.getMonth() + 1) + "." + pad(d.getDate()); }
  function esc(s) { return String(s).replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }

  /* ---------- camera lifecycle ---------- */
  function startCamera() {
    var video = document.getElementById("cam-video");
    var fallback = document.getElementById("cam-fallback");
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
        .then(function (stream) {
          mediaStream = stream;
          video.srcObject = stream;
          video.play().catch(function () {});
          state.streamOk = true;
          fallback.classList.remove("show");
        })
        .catch(function () {
          state.streamOk = false;
          fallback.classList.add("show");
        });
    } else {
      state.streamOk = false;
      fallback.classList.add("show");
    }
  }
  function stopCamera() {
    if (mediaStream) { mediaStream.getTracks().forEach(function (t) { t.stop(); }); mediaStream = null; }
    state.streamOk = false;
  }

  /* ---------- location ---------- */
  function mockNearLast() {
    function j() { return (Math.random() - 0.5) * 0.02; }
    return { lat: state.lastLoc.lat + j(), lng: state.lastLoc.lng + j(), mocked: true };
  }
  function fetchFreshLocation(cb) {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function (pos) {
          var loc = { lat: pos.coords.latitude, lng: pos.coords.longitude, mocked: false };
          state.lastLoc = loc; cb(loc);
        },
        function () { var loc = mockNearLast(); state.lastLoc = loc; cb(loc); },
        { enableHighAccuracy: true, timeout: 4000, maximumAge: 2000 }
      );
    } else {
      var loc = mockNearLast(); state.lastLoc = loc; cb(loc);
    }
  }

  /* ---------- capture ---------- */
  function capturePosterFrame() {
    var video = document.getElementById("cam-video");
    var canvas = document.getElementById("cam-canvas");
    if (state.streamOk && video.videoWidth) {
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      try { return canvas.toDataURL("image/jpeg", 0.85); } catch (e) {}
    }
    return "https://picsum.photos/seed/" + Date.now() + "/400/400";
  }

  function finalizeCapture(partial) {
    fetchFreshLocation(function (loc) {
      var item = Object.assign({
        id: "m" + Date.now() + Math.random().toString(36).slice(2, 6),
        ts: new Date(),
        lat: loc.lat, lng: loc.lng, mocked: loc.mocked,
        tags: state.lastTags.slice()
      }, partial);
      state.pending = item;
      showScreen("tag");
    });
  }

  function takePhoto() {
    var src = capturePosterFrame();
    finalizeCapture({ type: "photo", src: src, videoUrl: null, duration: 0, simulated: !state.streamOk });
  }

  function startRecording() {
    state.isRecording = true;
    updateHintRow();
    document.getElementById("shutter-inner").classList.add("video");
    var poster = capturePosterFrame();
    recordStart = Date.now();
    var ring = document.getElementById("ring-progress");
    var recTime = document.getElementById("rec-time");
    recordInterval = setInterval(function () {
      var elapsed = Date.now() - recordStart;
      var pct = Math.min(100, (elapsed / RECORD_DURATION) * 100);
      ring.setAttribute("stroke-dasharray", (pct / 100 * RING_C) + " " + RING_C);
      recTime.textContent = "REC " + (elapsed / 1000).toFixed(1) + "s / 3.0s";
    }, 30);

    var recorder = null, chunks = [];
    if (state.streamOk && window.MediaRecorder && mediaStream) {
      try {
        recorder = new MediaRecorder(mediaStream);
        recorder.ondataavailable = function (e) { if (e.data && e.data.size > 0) chunks.push(e.data); };
        recorder.start();
      } catch (e) { recorder = null; }
    }

    setTimeout(function () {
      clearInterval(recordInterval);
      if (recorder && recorder.state !== "inactive") {
        recorder.onstop = function () {
          var blob = new Blob(chunks, { type: "video/webm" });
          var url = URL.createObjectURL(blob);
          finalizeCapture({ type: "video", src: poster, videoUrl: url, duration: 3, simulated: false });
        };
        recorder.stop();
      } else {
        finalizeCapture({ type: "video", src: poster, videoUrl: null, duration: 3, simulated: true });
      }
      state.isRecording = false;
      document.getElementById("shutter-inner").classList.remove("video");
      ring.setAttribute("stroke-dasharray", "0 " + RING_C);
      updateHintRow();
    }, RECORD_DURATION);
  }

  function updateHintRow() {
    document.getElementById("hint-static").classList.toggle("hide", state.isRecording);
    document.getElementById("rec-live").classList.toggle("show", state.isRecording);
  }

  function updateGpsChip() {
    var el = document.getElementById("gps-text");
    if (state.lastLoc) {
      el.innerHTML = state.lastLoc.lat.toFixed(4) + " N<br>" + state.lastLoc.lng.toFixed(4) + " E " + (state.lastLoc.mocked ? "(推定)" : "");
    }
  }
  function updateLastShot() {
    var el = document.getElementById("last-shot");
    if (state.items.length) {
      var last = state.items[state.items.length - 1];
      el.style.backgroundImage = "url(" + last.src + ")";
      el.classList.toggle("video", last.type === "video");
    }
  }

  /* ---------- pointer handlers (shutter) ---------- */
  function onPointerDown(e) {
    e.preventDefault();
    if (state.isRecording || state.pending) return;
    pressTimer = setTimeout(function () { pressTimer = null; startRecording(); }, HOLD_THRESHOLD);
  }
  function onPointerUp() {
    if (pressTimer) {
      clearTimeout(pressTimer); pressTimer = null;
      if (!state.isRecording) takePhoto();
    }
  }

  /* ---------- tag screen ---------- */
  function renderTagScreen() {
    var p = state.pending;
    if (!p) return;
    var mediaHtml = "";
    if (p.type === "video" && p.videoUrl) {
      mediaHtml = '<video src="' + p.videoUrl + '" poster="' + p.src + '" controls playsinline class="tag-video"></video>';
    } else {
      mediaHtml = '<img src="' + p.src + '" alt="" class="tag-img">';
    }
    if (p.type === "video") {
      mediaHtml += '<div class="media-badge">▶ 0:03' + (p.simulated ? "(デモ)" : "") + "</div>";
    }
    document.getElementById("tag-shot-top").innerHTML = mediaHtml;

    document.getElementById("tag-meta").innerHTML =
      "<span>" + fmtDateTime(p.ts) + "</span><span>" + p.lat.toFixed(4) + ", " + p.lng.toFixed(4) + (p.mocked ? " (推定)" : "") + "</span>";

    var chipsHtml = state.allTags.map(function (tag) {
      var active = p.tags.indexOf(tag) !== -1;
      return '<div class="chip' + (active ? " active" : "") + '" data-action="toggle-tag" data-tag="' + esc(tag) + '">' + esc(tag) + "</div>";
    }).join("");

    if (state.showAddInput) {
      chipsHtml += '<input id="new-tag-input" class="tag-input" placeholder="新しいタグ" autofocus>';
    } else {
      chipsHtml += '<div class="chip add" data-action="add-tag-open">＋ 追加</div>';
    }
    document.getElementById("tag-chips").innerHTML = chipsHtml;

    if (state.showAddInput) {
      var input = document.getElementById("new-tag-input");
      input.focus();
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") commitNewTag(input.value);
        if (e.key === "Escape") { state.showAddInput = false; renderTagScreen(); }
      });
      input.addEventListener("blur", function () { commitNewTag(input.value); });
    }
  }
  function toggleTag(tag) {
    var idx = state.pending.tags.indexOf(tag);
    if (idx === -1) state.pending.tags.push(tag); else state.pending.tags.splice(idx, 1);
    renderTagScreen();
  }
  function commitNewTag(text) {
    var t = (text || "").trim();
    if (t) {
      if (state.allTags.indexOf(t) === -1) state.allTags.push(t);
      if (state.pending.tags.indexOf(t) === -1) state.pending.tags.push(t);
    }
    state.showAddInput = false;
    renderTagScreen();
  }
  function savePending() {
    state.lastTags = state.pending.tags.slice();
    state.items.push(state.pending);
    state.pending = null;
    showScreen("map");
  }
  function discardPending() {
    if (state.pending && state.pending.videoUrl) URL.revokeObjectURL(state.pending.videoUrl);
    state.pending = null;
    showScreen("camera");
  }

  /* ---------- map screen ---------- */
  function getProjected() {
    var filtered = state.items.filter(function (it) {
      return state.filteredTags.length === 0 || it.tags.some(function (t) { return state.filteredTags.indexOf(t) !== -1; });
    });
    var sorted = filtered.slice().sort(function (a, b) { return a.ts - b.ts; });
    var lats = sorted.map(function (i) { return i.lat; });
    var lngs = sorted.map(function (i) { return i.lng; });
    var minLat = lats.length ? Math.min.apply(null, lats) : 26.4, maxLat = lats.length ? Math.max.apply(null, lats) : 26.5;
    var minLng = lngs.length ? Math.min.apply(null, lngs) : 127.7, maxLng = lngs.length ? Math.max.apply(null, lngs) : 127.8;
    var latRange = Math.max(maxLat - minLat, 0.01), lngRange = Math.max(maxLng - minLng, 0.01);
    return sorted.map(function (it) {
      return Object.assign({}, it, {
        px: 10 + ((it.lng - minLng) / lngRange) * 80,
        py: 16 + ((maxLat - it.lat) / latRange) * 58
      });
    });
  }

  function renderMapScreen() {
    var filterHtml = '<div class="fchip' + (state.filteredTags.length === 0 ? "" : " off") + '" data-action="filter-all">すべて</div>';
    filterHtml += state.allTags.map(function (tag) {
      var on = state.filteredTags.indexOf(tag) !== -1;
      return '<div class="fchip' + (on ? "" : " off") + '" data-action="toggle-filter" data-tag="' + esc(tag) + '">' + esc(tag) + "</div>";
    }).join("");
    document.getElementById("map-filter").innerHTML = filterHtml;

    var projected = getProjected();
    document.getElementById("map-empty").style.display = projected.length ? "none" : "flex";

    var svg = document.getElementById("map-svg");
    var points = projected.map(function (p) { return p.px + "%," + p.py + "%"; }).join(" ");
    svg.innerHTML = '<polyline points="' + points + '" fill="none" stroke="#9AA39C" stroke-width="2" stroke-dasharray="1 8" stroke-linecap="round"/>';

    if (!state.selectedId || !projected.some(function (p) { return p.id === state.selectedId; })) {
      state.selectedId = projected.length ? projected[projected.length - 1].id : null;
    }

    document.getElementById("map-pins").innerHTML = projected.map(function (p) {
      var cls = "pin" + (p.type === "video" ? " video" : "") + (p.id === state.selectedId ? " sel" : "");
      return '<div class="' + cls + '" data-action="select-pin" data-id="' + p.id + '" style="left:' + p.px + '%;top:' + p.py + '%"><img src="' + p.src + '" alt=""></div>';
    }).join("");

    var sel = projected.find(function (p) { return p.id === state.selectedId; });
    var sheetEl = document.getElementById("map-sheet-content");
    if (sel) {
      var filmHtml = projected.map(function (p) {
        var cls = "film-item" + (p.id === sel.id ? " sel" : "");
        var dur = p.type === "video" ? '<div class="dur">0:03</div>' : "";
        return '<div class="' + cls + '" data-action="select-pin" data-id="' + p.id + '"><img src="' + p.src + '" alt="">' + dur + "</div>";
      }).join("");
      sheetEl.innerHTML =
        '<div class="sheet-title">' + fmtDateShort(sel.ts) + "　" + esc(sel.tags.join(" / ") || "タグなし") + '</div>' +
        '<div class="sheet-sub">' + sel.lat.toFixed(4) + ", " + sel.lng.toFixed(4) + " ・ " + (sel.type === "video" ? "動画 0:03" : "写真") + '</div>' +
        '<div class="film">' + filmHtml + "</div>";
    } else {
      sheetEl.innerHTML = '<div class="sheet-sub">ピンをタップすると詳細が表示されます</div>';
    }
  }

  /* ---------- list screen ---------- */
  function renderListScreen() {
    var groups = state.allTags.map(function (tag) {
      var group = state.items.filter(function (it) { return it.tags.indexOf(tag) !== -1; }).sort(function (a, b) { return a.ts - b.ts; });
      return { tag: tag, group: group };
    }).filter(function (g) { return g.group.length > 0; });

    document.getElementById("list-summary").textContent = groups.length + " tags ・ " + state.items.length + " items";

    document.getElementById("list-grid").innerHTML = groups.map(function (g) {
      var range = fmtDateShort(g.group[0].ts) + (g.group.length > 1 ? "-" + fmtDateShort(g.group[g.group.length - 1].ts) : "") + " ・ " + g.group.length;
      var thumbs = g.group.slice(0, 3).map(function (it) {
        var dur = it.type === "video" ? '<div class="dur">0:03</div>' : "";
        return '<div class="t-item"><img src="' + it.src + '" alt="">' + dur + "</div>";
      }).join("");
      return '<div class="album" data-action="open-album" data-tag="' + esc(g.tag) + '">' +
        '<div class="album-top"><span class="name">' + esc(g.tag) + '</span><span class="range">' + range + "</span></div>" +
        '<div class="thumbs">' + thumbs + "</div></div>";
    }).join("");
  }

  /* ---------- screen switching ---------- */
  function showScreen(name) {
    state.screen = name;
    ["camera", "tag", "map", "list"].forEach(function (s) {
      document.getElementById("screen-" + s).classList.toggle("active", s === name);
    });
    var tabbar = document.getElementById("tabbar");
    tabbar.classList.toggle("hidden", name === "tag");
    tabbar.classList.toggle("dark", name === "camera");
    Array.prototype.forEach.call(tabbar.querySelectorAll("button"), function (b) {
      b.classList.toggle("active", b.dataset.screen === name);
    });

    if (name === "camera") { startCamera(); updateGpsChip(); updateLastShot(); }
    else { stopCamera(); }

    if (name === "tag") renderTagScreen();
    if (name === "map") renderMapScreen();
    if (name === "list") renderListScreen();
  }

  function resetDemo() {
    state.items = seedItems.slice();
    state.allTags = ["沖縄旅行", "8月デート"];
    state.filteredTags = [];
    state.selectedId = null;
    state.pending = null;
    showScreen("camera");
  }

  /* ---------- event delegation ---------- */
  document.addEventListener("click", function (e) {
    var el = e.target.closest("[data-action]");
    if (!el) return;
    var action = el.dataset.action;
    if (action === "show") showScreen(el.dataset.screen);
    else if (action === "reset") resetDemo();
    else if (action === "discard") discardPending();
    else if (action === "save") savePending();
    else if (action === "toggle-tag") toggleTag(el.dataset.tag);
    else if (action === "add-tag-open") { state.showAddInput = true; renderTagScreen(); }
    else if (action === "filter-all") { state.filteredTags = []; state.selectedId = null; renderMapScreen(); }
    else if (action === "toggle-filter") {
      var tag = el.dataset.tag;
      var idx = state.filteredTags.indexOf(tag);
      if (idx === -1) state.filteredTags.push(tag); else state.filteredTags.splice(idx, 1);
      state.selectedId = null;
      renderMapScreen();
    }
    else if (action === "select-pin") { state.selectedId = el.dataset.id; renderMapScreen(); }
    else if (action === "open-album") { state.filteredTags = [el.dataset.tag]; showScreen("map"); }
  });

  var shutter = document.getElementById("shutter-outer");
  shutter.addEventListener("pointerdown", onPointerDown);
  shutter.addEventListener("pointerup", onPointerUp);
  shutter.addEventListener("pointerleave", onPointerUp);
  shutter.addEventListener("contextmenu", function (e) { e.preventDefault(); });

  /* ---------- init ---------- */
  showScreen("camera");

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
})();
</script>
</body>
